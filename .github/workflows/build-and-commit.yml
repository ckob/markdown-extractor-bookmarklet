name: Build and Commit

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Both Versions
        run: npm run build

      - name: Commit and Push compiled files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B build
          git add -f dist/
          git commit -m "chore: update compiled bookmarklets [skip ci]" || echo "No changes to commit"
          git push origin build -f

      - name: Purge jsDelivr Cache
        run: |
          curl -s https://purge.jsdelivr.net/gh/ckob/markdown-extractor-bookmarklet@build/dist/bookmarklet-cdn.min.js
          curl -s https://purge.jsdelivr.net/gh/ckob/markdown-extractor-bookmarklet@build/dist/bookmarklet-bundled.min.js
